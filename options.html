<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>插件配置</title>
</head>
<body>
  <h3>插件配置</h3>
  <label>模型 Base URL: <input id="baseUrl"></label><br>
  <label>API Key: <input id="apiKey"></label><br>
  <label>模型 1 (默认): <input id="model1" placeholder="例如: deepseek-ai/DeepSeek-V3.2"></label><br>
  <label>模型 2: <input id="model2" placeholder="例如: gpt-4"></label><br>
  <label>模型 3: <input id="model3" placeholder="例如: claude-3"></label><br>
  <label>温度 (0-1): <input id="temperature" type="number" step="0.1" min="0" max="1"></label><br>
  <button id="saveBtn">保存</button>
  <script src="options.js"></script>
</body>
</html>
